<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Secure Payment</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-100);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 36px 32px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .login-brand .brand-icon {
      width: 40px; height: 40px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 20px;
    }
    .login-brand h1 { font-size: 18px; margin: 0; color: var(--text-main); }
    .login-sub { color: var(--text-sub); font-size: 13px; margin: 4px 0 24px; }
    .login-label { display:block; font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }
    .login-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 15px;
      box-sizing: border-box;
    }
    .login-input:focus { outline: none; border-color: var(--primary-light); }
    .login-btn {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-btn:hover { background: var(--primary-light); }
    .login-error {
      background: #fde8e8;
      color: var(--danger);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">S</div>
        <h1>Secure Payment</h1>
      </div>
      <p class="login-sub">Sign in to access the admin panel</p>

      {% if error %}
      <div class="login-error"><i class="fas fa-circle-exclamation"></i> {{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" autofocus required />
        <button class="login-btn" type="submit">
          <i class="fas fa-right-to-bracket"></i> Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
