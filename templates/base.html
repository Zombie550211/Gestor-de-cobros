<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Spectrum Payment Center{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">S</div>
        <div class="brand-text">
          <span class="brand-name">Spectrum</span>
          <span class="brand-sub">Payment Center</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="/payments/create" class="nav-item {% if active_page == 'create' %}active{% endif %}">
          <i class="fas fa-plus-circle"></i>
          <span>New Payment</span>
        </a>
        <a href="/payments" class="nav-item {% if active_page == 'payments' %}active{% endif %}">
          <i class="fas fa-list-ul"></i>
          <span>All Payments</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <i class="fas fa-user-circle"></i>
        <span>Agent Portal</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
        <div class="topbar-center">
          {% block topbar_title %}{% endblock %}
        </div>
        <div class="topbar-right">
          <span class="live-badge"><span class="live-dot"></span> Live</span>
        </div>
      </header>

      <div class="page-body">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script src="/static/js/main.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
